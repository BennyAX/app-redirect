<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AthleteXchange</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    a {
      display: block;
      margin: 15px 0;
      font-size: 18px;
      color: #007aff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h2>Opening AthleteXchange...</h2>
  <p>If nothing happens, choose an option below:</p>

  <a href="https://apps.apple.com/app/athletexchange/id6761602466">Download on App Store</a>
  <a href="https://play.google.com/store/apps/details?id=au.com.athletexchange.app1">Get it on Google Play</a>
  <a href="https://athletexchange.com.au">Continue to Website</a>

  <script>
  var ua = navigator.userAgent;

  setTimeout(function() {
    if (/Android/i.test(ua)) {
      window.location.href = "https://play.google.com/store/apps/details?id=au.com.athletexchange.app1";
    } else if (/iPhone|iPad|iPod/i.test(ua)) {
      window.location.href = "https://apps.apple.com/app/athletexchange/id6761602466";
    } else {
      window.location.href = "https://athletexchange.com.au";
    }
  }, 250);
</script>

</body>
</html>
